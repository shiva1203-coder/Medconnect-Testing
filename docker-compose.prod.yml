version: '3.9'
services:
  db:
    image: mysql:8.0
    container_name: medconnect-db
    environment:
      MYSQL_DATABASE: medconnect_db
      MYSQL_USER: medconnect
      MYSQL_PASSWORD: medconnect_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - medconnect_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 20

  medconnect:
    build: .
    container_name: medconnect-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      SECRET_KEY: replace-with-strong-secret
      DATABASE_URL: mysql+pymysql://medconnect:medconnect_password@db:3306/medconnect_db
      OTP_EXPIRY_SECONDS: 300
      OTP_MAX_RETRIES: 3
      IVR_RATE_LIMIT: 10/minute
      ADMIN_API_KEY: replace-admin-key
      PORT: 5000
      WAIT_FOR_DB: 1
      AUTO_CREATE_TABLES: 1
    ports:
      - "5000:5000"
    restart: unless-stopped

volumes:
  medconnect_mysql_data:
