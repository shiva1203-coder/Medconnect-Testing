version: '3.9'
services:
  medconnect:
    build: .
    container_name: medconnect-app
    env_file:
      - ./medconnect/config/secrets.env
    ports:
      - "5000:5000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
